# Configuration de déploiement Railway (Nixpacks) pour Laravel + Vue/Vite.
# On laisse Nixpacks servir l'appli avec son serveur web intégré (Caddy),
# qui écoute automatiquement sur le port fourni par Railway (évite les 502).
# Les migrations sont lancées à la fin de la construction.

[phases.setup]
nixPkgs = ["...", "nodejs_20"]

[phases.build]
cmds = ["...", "php artisan migrate:fresh --force --seed || true"]
